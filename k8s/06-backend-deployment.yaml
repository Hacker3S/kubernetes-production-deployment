apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: multiservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # Replace with your own Docker Hub username (same image you pushed in Project 1's workflow)
          image: hacker3s/multi-service-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: PORT
              value: "5000"
            # The Secret's keys are named POSTGRES_*  (required by the official
            # postgres image), but server.js / db.js expect DB_USER, DB_PASSWORD,
            # DB_NAME. secretKeyRef lets us reuse one Secret under different names
            # instead of duplicating credentials in two places.
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
